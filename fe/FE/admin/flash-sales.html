<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Flash Sale — Luxury PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin/admin-global.css">
    
    <!-- React & Babel -->
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <style>
        .toast { padding: 1rem 1.5rem; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .toast-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
        .toast-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
        
        .badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .badge-green { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
        .badge-red { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
        .badge-blue { background: rgba(59,130,246,0.1); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: flex; align-items: center; justify-content: center; }
        .modal { background: var(--dark); border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; padding: 2rem; width: 550px; max-width: 90vw; }
        .modal-title { font-size: 1.2rem; color: var(--gold); margin-bottom: 1.5rem; font-weight: 600; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
        .form-group label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
        .form-group input { background: var(--black); border: 1px solid rgba(201,168,76,0.15); color: var(--cream); padding: 0.6rem 0.8rem; border-radius: 4px; font-size: 0.85rem; outline: none; font-family: var(--sans); }
        .form-group input:focus { border-color: var(--gold); }
        .form-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem; }
    </style>

    <script th:inline="javascript">
        window.INITIAL_DATA = {
            flashSales: [
                { id: 1, name: 'Flash Sale Tháng 4', startTime: '2026-04-01T00:00:00Z', endTime: '2026-04-05T23:59:59Z', status: 'ENDED' },
                { id: 2, name: 'Flash Sale Black Friday', startTime: '2026-11-20T00:00:00Z', endTime: '2026-11-25T23:59:59Z', status: 'UPCOMING' }
            ],
            successMsg: '',
            errorMsg: '',
            username: 'Admin'
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="../js/react/AdminComponents.jsx"></script>

    <script type="text/babel">
/*<![CDATA[*/
        function FlashSaleModal({ onClose }) {
            return (
                <div className="modal-overlay" onClick={(e) => { if(e.target === e.currentTarget) onClose(); }}>
                    <div className="modal">
                        <div className="modal-title"><i className="fa-solid fa-bolt" style={{marginRight: '8px'}}></i>Tạo Flash Sale Mới</div>
                        <form action="/admin/flash-sales/save" method="POST">
                            <div className="form-group">
                                <label>Tên Chương Trình</label>
                                <input type="text" name="name" required placeholder="VD: Flash Sale Tháng 4" />
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>Bắt Đầu</label>
                                    <input type="datetime-local" name="startTime" required />
                                </div>
                                <div className="form-group">
                                    <label>Kết Thúc</label>
                                    <input type="datetime-local" name="endTime" required />
                                </div>
                            </div>
                            <div className="form-actions">
                                <button type="button" className="btn" style={{background: 'var(--mid)', color: 'var(--muted)'}} onClick={onClose}>Hủy</button>
                                <button type="submit" className="btn btn-gold"><i className="fa-solid fa-save"></i> Tạo Chương Trình</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function App() {
            const [showModal, setShowModal] = React.useState(false);
            const data = window.INITIAL_DATA.flashSales || [];
            const { successMsg, errorMsg } = window.INITIAL_DATA;

            const columns = [
                { key: 'id', label: 'ID', render: (row) => <span style={{color: 'var(--muted)'}}>#{row.id}</span> },
                { key: 'name', label: 'Tên Chương Trình', render: (row) => <span style={{fontWeight: 600, color: 'var(--white)'}}>{row.name}</span> },
                { key: 'startTime', label: 'Bắt Đầu', render: (row) => <span style={{fontSize: '0.75rem'}}>{new Date(row.startTime).toLocaleString('vi-VN')}</span> },
                { key: 'endTime', label: 'Kết Thúc', render: (row) => <span style={{fontSize: '0.75rem'}}>{new Date(row.endTime).toLocaleString('vi-VN')}</span> },
                { 
                    key: 'status', 
                    label: 'Trạng Thái', 
                    render: (row) => {
                        if (row.status === 'RUNNING') return <span className="badge badge-green">🔥 Đang diễn ra</span>;
                        if (row.status === 'UPCOMING') return <span className="badge badge-blue">⏳ Sắp diễn ra</span>;
                        if (row.status === 'ENDED') return <span className="badge badge-red">Đã kết thúc</span>;
                        if (row.status === 'DISABLED') return <span className="badge badge-red">Đã tắt</span>;
                        return <span>{row.status}</span>;
                    }
                },
                { 
                    key: 'actions', 
                    label: 'Hành Động',
                    sortable: false,
                    render: (row) => (
                        <div style={{display: 'flex', gap: '6px', alignItems: 'center'}}>
                            <a href={`/admin/flash-sales/${row.id}/items`} className="btn btn-sm btn-outline" style={{padding: '0.4rem 0.8rem', color: 'var(--blue)', borderColor: 'var(--blue)'}}><i className="fa-solid fa-cubes"></i> Sản Phẩm</a>
                            <form action={`/admin/flash-sales/delete/${row.id}`} method="POST" style={{display: 'inline'}} onSubmit={(e) => {if(!confirm('Xóa chương trình Flash Sale này?')) e.preventDefault()}}>
                                <button type="submit" className="btn btn-sm btn-danger"><i className="fa-solid fa-trash"></i></button>
                            </form>
                        </div>
                    )
                }
            ];

            return (
                <React.Fragment>
                    <AdminSidebar active="flash-sales" />
                    <div className="main-content">
                        <AdminHeader title="Quản Lý Flash Sale" subtitle="Tạo chương trình Flash Sale với giá sốc, thời gian giới hạn" username={window.INITIAL_DATA.username} />
                        
                        {successMsg && <div className="toast toast-success"><i className="fa-solid fa-check-circle"></i> <span>{successMsg}</span></div>}
                        {errorMsg && <div className="toast toast-error"><i className="fa-solid fa-exclamation-circle"></i> <span>{errorMsg}</span></div>}

                        <div className="card">
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem'}}>
                                <span style={{fontSize: '1.1rem', fontWeight: 600, color: 'var(--gold)'}}><i className="fa-solid fa-list"></i> Danh Sách Chương Trình</span>
                                <button className="btn btn-gold" onClick={() => setShowModal(true)}><i className="fa-solid fa-plus"></i> Tạo Flash Sale</button>
                            </div>

                            {data.length > 0 ? (
                                <DataGrid columns={columns} data={data} searchPlaceholder="Tìm kiếm chương trình..." itemsPerPage={10} />
                            ) : (
                                <div style={{textAlign: 'center', padding: '3rem', color: 'var(--muted)'}}>
                                    <i className="fa-solid fa-bolt" style={{fontSize: '3rem', marginBottom: '1rem', color: 'rgba(201,168,76,0.2)'}}></i>
                                    <p>Chưa có chương trình Flash Sale nào.</p>
                                </div>
                            )}
                        </div>

                        {showModal && <FlashSaleModal onClose={() => setShowModal(false)} />}
                    </div>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
/*]]>*/
</script>
</body>
</html>
