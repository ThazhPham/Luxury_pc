<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Giỏ Hàng - LuxuryPC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
        --gold: #C5A25D;
        --gold-light: #d8ba7b;
        --black: #0b0b0b;
        --deep: #111111;
        --dark-grey: #1a1a1a;
        --border-color: rgba(201,168,76,0.15);
        --text-muted: #888;
    }

    body {
        background-color: var(--black);
        color: #ffffff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
    }

    /* Header Logo Section */
    .header-logo {
        padding: 30px 0;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 40px;
    }

    .logo-text { font-size: 2.2rem; font-weight: bold; letter-spacing: 5px; color: #ffffff; text-decoration: none; }
    .logo-text span { color: var(--gold); font-weight: 300; margin: 0 10px; }
    .logo-pc { font-weight: 300; letter-spacing: 8px; }

    .page-title {
        color: var(--gold);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 30px;
        font-size: 1.8rem;
    }

    /* 2 Column Layout */
    .cart-container {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        align-items: flex-start;
    }
    .cart-items-wrap {
        flex: 1 1 60%;
        min-width: 320px;
    }
    .cart-summary-wrap {
        flex: 1 1 30%;
        min-width: 300px;
        position: sticky;
        top: 20px;
    }

    /* Item Card */
    .cart-item {
        display: flex;
        align-items: center;
        background: var(--dark-grey);
        border: 1px solid var(--border-color);
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 8px;
        transition: transform 0.3s ease, border-color 0.3s ease;
        position: relative;
    }
    .cart-item:hover {
        border-color: rgba(201,168,76,0.4);
        transform: translateY(-2px);
    }
    .item-img {
        width: 100px;
        height: 100px;
        background: var(--deep);
        border: 1px solid var(--border-color);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: var(--gold);
        margin-right: 20px;
        flex-shrink: 0;
        overflow: hidden;
    }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-details { flex: 1; }
    .item-name {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 8px;
        color: #fff;
    }
    .item-price {
        font-size: 1rem;
        color: var(--text-muted);
        margin-bottom: 15px;
    }
    .item-total-price {
        font-size: 1.2rem;
        color: var(--gold);
        font-weight: bold;
        white-space: nowrap;
        text-align: right;
    }

    /* Quantity Controls */
    .qty-controls {
        display: inline-flex;
        align-items: center;
        background: var(--deep);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 5px;
    }
    .btn-qty {
        background: transparent;
        border: none;
        color: #fff;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-qty:hover { background: var(--gold); color: #000; }
    .qty-input {
        background: transparent !important;
        border: none;
        color: #fff !important;
        width: 40px !important;
        text-align: center;
        font-weight: 600;
        outline: none;
    }

    /* Remove Action */
    .btn-remove {
        position: absolute;
        top: 15px;
        right: 15px;
        color: var(--text-muted);
        background: none;
        border: none;
        font-size: 1.2rem;
        transition: 0.3s;
        padding: 5px;
    }
    .btn-remove:hover { color: #ff4444; transform: scale(1.1); }

    /* Summary Card */
    .summary-card {
        background: var(--dark-grey);
        border: 1px solid var(--border-color);
        padding: 25px;
        border-radius: 8px;
    }
    .summary-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--gold);
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 15px;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 1rem;
        color: var(--text-muted);
    }
    .summary-total {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
        font-size: 1.4rem;
        font-weight: bold;
        color: #fff;
    }
    .summary-total span.gold-text { color: var(--gold); }

    /* Buttons */
    .btn-gold {
        background: linear-gradient(135deg, var(--gold), var(--gold-light));
        color: #000;
        border: none;
        font-weight: bold;
        padding: 15px;
        width: 100%;
        margin-top: 25px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 4px;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(197, 162, 93, 0.2);
    }
    .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(197, 162, 93, 0.4); color: #000; }
    
    .btn-outline-gold {
        display: inline-block;
        background-color: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
        font-weight: 600;
        padding: 10px 25px;
        border-radius: 4px;
        text-decoration: none;
        transition: 0.3s;
        margin-bottom: 20px;
    }
    .btn-outline-gold:hover { background-color: var(--gold); color: #000; }

    /* Empty Cart */
    .empty-cart {
        padding: 80px 20px;
        text-align: center;
        background: var(--dark-grey);
        border: 1px dashed rgba(201,168,76,0.3);
        border-radius: 8px;
    }
    .empty-cart i { font-size: 4rem; color: var(--border-color); margin-bottom: 20px; }
    .empty-cart h4 { color: #fff; margin-bottom: 20px; font-weight: 300; }
  </style>
</head>
<body>

<header class="header-logo">
  <div class="container">
    <a href="./index.html" class="logo-text">LUXURY<span>|</span><span class="logo-pc">PC</span></a>
  </div>
</header>

<div class="container mb-5">
  <h2 class="page-title">Giỏ Hàng Của Bạn</h2>
  <a href="./index.html" class="btn-outline-gold"><i class="fa-solid fa-arrow-left me-2"></i> Tiếp tục mua hàng</a>

  <div class="cart-container" th:if="${!#lists.isEmpty(cartItems)}" id="cart-content">
    
    <!-- Cột trái: Danh sách item -->
    <div class="cart-items-wrap" id="cart-item-list">
      <div class="cart-item" th:each="item : ${cartItems}" th:id="'row-' + ${item.id}">
        <!-- Dùng hình ảnh Product nếu có, fallback là icon -->
        <div class="item-img">
            <img th:if="${item.image != null and item.image != ''}" th:src="@{${item.image.startsWith('http') ? item.image : '/images/products/' + item.image}}" alt="Hình sản phẩm" style="width:100%; height:100%; object-fit:cover; border-radius:5px;">
            <i th:unless="${item.image != null and item.image != ''}" class="fa-solid fa-computer"></i>
        </div>
        
        <div class="item-details">
          <div class="item-name" th:text="${item.name}">Tên sản phẩm</div>
          <div class="item-price" 
               th:data-price="${item.price}" 
               th:text="'Đơn giá: ' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
          </div>
          <div class="qty-controls">
            <button type="button" class="btn-qty" th:onclick="'updateQty(' + ${item.id} + ', -1)'"><i class="fa-solid fa-minus"></i></button>
            <input type="text" class="qty-input" th:id="'qty-' + ${item.id}" th:value="${item.quantity}" readonly>
            <button type="button" class="btn-qty" th:onclick="'updateQty(' + ${item.id} + ', 1)'"><i class="fa-solid fa-plus"></i></button>
          </div>
        </div>
        
        <div class="item-total-price">
            <span class="item-total" th:id="'total-' + ${item.id}"></span>
        </div>
        
        <button class="btn-remove" th:onclick="'removeItem(' + ${item.id} + ')'" title="Xóa sản phẩm">
            <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <!-- Cột phải: Tổng thanh toán -->
    <div class="cart-summary-wrap" id="cart-footer">
      <div class="summary-card">
          <div class="summary-title">Tóm Tắt Đơn Hàng</div>
          <div class="summary-row">
              <span>Tạm tính (<span id="total-qty">0</span> món)</span>
              <span id="sub-total">0 ₫</span>
          </div>
          <div class="summary-row">
              <span>Phí vận chuyển</span>
              <span>Miễn phí</span>
          </div>
          <div class="summary-total">
              <span>Tổng Cộng</span>
              <span class="gold-text" id="grand-total">0 ₫</span>
          </div>
          <a href="./checkout.html" style="text-decoration: none;">
            <button type="button" class="btn btn-gold">Thanh Toán Ngay <i class="fa-solid fa-arrow-right ms-2"></i></button>
          </a>
      </div>
    </div>

  </div>

  <!-- Khi giỏ rỗng -->
  <div th:if="${#lists.isEmpty(cartItems)}" id="empty-row" class="empty-cart mt-4">
      <i class="fa-solid fa-cart-shopping"></i>
      <h4>Giỏ hàng của bạn đang trống.</h4>
      <a href="./index.html" class="btn-outline-gold mt-2">Đến Cửa Hàng</a>
  </div>
  
  <!-- Chỗ chứa khi xóa hết item bằng ajax -->
  <div id="ajax-empty-row" class="empty-cart mt-4" style="display: none;">
      <i class="fa-solid fa-cart-shopping"></i>
      <h4>Giỏ hàng của bạn đang trống.</h4>
      <a href="./index.html" class="btn-outline-gold mt-2">Đến Cửa Hàng</a>
  </div>

</div>

<script>
  function formatMoney(amount) {
      return new Intl.NumberFormat('vi-VN').format(amount) + ' ₫';
  }

  function updateGrandTotal() {
      let grandTotal = 0;
      let totalQty = 0;
      const rows = document.querySelectorAll('.cart-item');

      if (rows.length === 0) {
          showEmptyCart();
          return;
      }

      rows.forEach(row => {
          const priceEl = row.querySelector('.item-price');
          const qtyInput = row.querySelector('.qty-input');
          if(priceEl && qtyInput) {
              const price = parseFloat(priceEl.getAttribute('data-price'));
              const qty = parseInt(qtyInput.value);
              const itemTotal = price * qty;
              row.querySelector('.item-total').innerText = formatMoney(itemTotal);
              grandTotal += itemTotal;
              totalQty += qty;
          }
      });

      const grandTotalEl = document.getElementById('grand-total');
      const subTotalEl = document.getElementById('sub-total');
      const totalQtyEl = document.getElementById('total-qty');
      
      if(grandTotalEl) grandTotalEl.innerText = formatMoney(grandTotal);
      if(subTotalEl) subTotalEl.innerText = formatMoney(grandTotal);
      if(totalQtyEl) totalQtyEl.innerText = totalQty;
  }

  function showEmptyCart() {
      const content = document.getElementById('cart-content');
      const ajaxEmpty = document.getElementById('ajax-empty-row');
      if(content) content.style.display = 'none';
      if(ajaxEmpty) ajaxEmpty.style.display = 'block';
  }

  function syncWithServer(id, quantity) {
      fetch(`/cart/update?id=${id}&quantity=${quantity}`, { method: 'POST' })
      .catch(err => console.error("Lỗi đồng bộ server:", err));
  }

  function updateQty(id, delta) {
      const qtyInput = document.getElementById('qty-' + id);
      let currentQty = parseInt(qtyInput.value);
      let newQty = currentQty + delta;

      if (newQty > 0) {
          qtyInput.value = newQty;
          updateGrandTotal();
          syncWithServer(id, newQty);
      }
  }

  function removeItem(id) {
      if (confirm("Bạn muốn xóa sản phẩm này khỏi giỏ hàng?")) {
          fetch(`/cart/remove?id=${id}`, { method: 'POST' })
          .then(response => {
              if (response.ok) {
                  const row = document.getElementById('row-' + id);
                  row.style.transform = 'translateX(-20px)';
                  row.style.opacity = '0';
                  setTimeout(() => {
                      row.remove();
                      updateGrandTotal();
                  }, 300);
              }
          });
      }
  }

  document.addEventListener('DOMContentLoaded', updateGrandTotal);
</script>

</body>
</html>
